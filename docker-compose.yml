services:
  abcsxl:
    image: ${DOCKER_REGISTRY-}abcsxl
    container_name: mvc_abcsxl
    build:
      context: .
      dockerfile: src/Web/abcsxl/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=db_abcsxl;Username=postgres;Password=Pass@word123
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    container_name: db_abcsxl
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=db_abcsxl
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Pass@word123
    ports:
      - "5432:5432"

volumes:
  db_data: